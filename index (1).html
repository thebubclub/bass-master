<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>バス釣り名人 — SUPER BASS MASTER</title>
<meta property="og:type" content="website">
<meta property="og:title" content="▶ バス釣り名人 — SUPER BASS MASTER (playable)">
<meta property="og:description" content="A 32-bit Japanese bass fishing game. Charge your cast, wait for the strike, then fight the fish in. Tap to play.">
<meta property="og:image" content="https://REPLACE_WITH_YOUR_USERNAME.github.io/bass-master/preview.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="▶ バス釣り名人 — SUPER BASS MASTER">
<meta name="twitter:image" content="https://REPLACE_WITH_YOUR_USERNAME.github.io/bass-master/preview.png">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;background:#05070d;overflow:hidden;font-family:'Trebuchet MS','Segoe UI',system-ui,sans-serif;}
  #wrap{height:100%;display:flex;align-items:center;justify-content:center;}
  canvas{width:min(100vw,100vh*0.5625);height:min(177.7vw,100vh);background:#05070d;box-shadow:0 0 0 3px #11151f,0 0 60px rgba(0,0,0,.85);touch-action:none;}
</style>
</head>
<body>
<div id="wrap"><canvas id="g" width="360" height="640"></canvas></div>
<script>
const cv=document.getElementById('g'), x=cv.getContext('2d');
const W=360,H=640,TAU=Math.PI*2,now=()=>performance.now();
let down=false,justDown=false,justUp=false;
function oD(e){e.preventDefault();if(!down){down=true;justDown=true;}}
function oU(e){e.preventDefault();if(down){down=false;justUp=true;}}
cv.addEventListener('pointerdown',oD,{passive:false});
cv.addEventListener('pointerup',oU,{passive:false});
cv.addEventListener('pointercancel',oU,{passive:false});
window.addEventListener('keydown',e=>{if(e.code==='Space'||e.code==='Enter'){e.preventDefault();if(!e.repeat)oD(e);}});
window.addEventListener('keyup',e=>{if(e.code==='Space'||e.code==='Enter'){e.preventDefault();oU(e);}});
const rnd=(a,b)=>a+Math.random()*(b-a),clamp=(v,a,b)=>v<a?a:v>b?b:v,lerp=(a,b,t)=>a+(b-a)*t;
function rr(px,py,w,h,r){x.beginPath();x.moveTo(px+r,py);x.arcTo(px+w,py,px+w,py+h,r);x.arcTo(px+w,py+h,px,py+h,r);x.arcTo(px,py+h,px,py,r);x.arcTo(px,py,px+w,py,r);x.closePath();}
function grad(x0,y0,x1,y1,st){const g=x.createLinearGradient(x0,y0,x1,y1);st.forEach(s=>g.addColorStop(s[0],s[1]));return g;}
function txt(s,px,py,c,sz,al='left',w=700){x.fillStyle=c;x.font=w+' '+sz+"px 'Trebuchet MS',sans-serif";x.textAlign=al;x.textBaseline='alphabetic';x.fillText(s,px,py);}
const FISH=[
 {n:'コバス',en:'Small Bass',kg:[0.8,1.8],pts:120,w:0.42,fight:0.7},
 {n:'バス',en:'Largemouth',kg:[2,3.8],pts:280,w:0.33,fight:1.0},
 {n:'デカバス',en:'Lunker',kg:[4,6],pts:620,w:0.18,fight:1.5},
 {n:'ヌシ',en:'The Lord',kg:[7,9.5],pts:1800,w:0.07,fight:2.1}];
function rollFish(){let r=Math.random(),a=0;for(const f of FISH){a+=f.w;if(r<=a)return f;}return FISH[0];}
let S='title',score=0,best=Number(localStorage.getItem('bm_best')||0),caught=0;
let dt=0,last=now(),tt=0;
let charge=0,chargeDir=1,castTargetY=0;
let lure={x:W/2,y:0,bob:0};
let biteTimer=0,shadow=null,strikeT=0,strikeLen=0;
let fish=null,hookSet=0,line=1,distance=1,fishPull=0,fishPullTarget=0,fishDir=1,tension=0;
let caughtFish=null,gained=0,msg='',msgT=0,shake=0;
let ripples=[],splash=[];
function setMsg(m,d=1200){msg=m;msgT=d;}
function addRipple(px,py){ripples.push({x:px,y:py,r:4,a:1});}
function addSplash(px,py,n){for(let i=0;i<n;i++)splash.push({x:px,y:py,vx:rnd(-1.4,1.4),vy:rnd(-3.2,-1),a:1,r:rnd(1,2.6)});}
function startAim(){S='aim';charge=0;chargeDir=1;}
function releaseCast(){castTargetY=lerp(250,470,charge);lure.x=W/2;lure.y=140;S='cast';addRipple(W/2,castTargetY);}
function toWait(){S='wait';biteTimer=rnd(900,2200);shadow=null;}
function spawnBite(){fish=rollFish();shadow={x:lure.x+rnd(-30,30),y:lure.y+24,app:0,from:Math.random()<.5?-1:1};}
function toStrike(){S='strike';strikeT=0;strikeLen=lerp(680,400,fish.fight/2.1);}
function hookUp(q){caughtFish=fish;hookSet=q;line=1;distance=1;fishPull=0;fishPullTarget=rnd(0.3,0.6)*fish.fight;fishDir=1;tension=0.2;S='fight';addSplash(lure.x,lure.y,14);shake=10;}
function landFish(){const f=caughtFish;f.kg2=rnd(f.kg[0],f.kg[1]);gained=Math.round(f.pts*(0.6+hookSet*0.4));score+=gained;caught++;if(score>best){best=score;localStorage.setItem('bm_best',best);}S='caught';addSplash(lure.x,lure.y,20);}
function lineSnap(){setMsg('ラインブレイク! LINE SNAPPED',1500);S='lost';shake=14;}
function gotAway(){setMsg('バラした! IT THREW THE HOOK',1400);S='lost';}
function update(d){
 tt+=d;
 if(shake>0)shake=Math.max(0,shake-d*40);
 ripples.forEach(r=>{r.r+=d*60;r.a-=d*1.6;});ripples=ripples.filter(r=>r.a>0);
 splash.forEach(s=>{s.x+=s.vx;s.y+=s.vy;s.vy+=0.25;s.a-=d*2;});splash=splash.filter(s=>s.a>0);
 if(S==='title'){if(justDown)startAim();}
 else if(S==='aim'){charge=clamp(charge+chargeDir*d*1.1,0,1);if(charge>=1||charge<=0)chargeDir*=-1;if(justUp)releaseCast();}
 else if(S==='cast'){lure.y=lerp(lure.y,castTargetY,Math.min(1,d*5));lure.x=lerp(lure.x,W/2,Math.min(1,d*5));if(Math.abs(lure.y-castTargetY)<3){lure.y=castTargetY;toWait();}}
 else if(S==='wait'){lure.bob+=d*3;lure.y=castTargetY+Math.sin(lure.bob)*2.5;biteTimer-=d*1000;
  if(biteTimer<420&&!shadow)spawnBite();
  if(shadow){shadow.app=clamp(shadow.app+d*1.4,0,1);shadow.x=lerp(shadow.x,lure.x,d*2);shadow.y=lerp(shadow.y,lure.y+18,d*2);}
  if(justDown){setMsg('はやい! TOO EARLY',1000);toWait();biteTimer=rnd(800,1600);}
  if(biteTimer<=0)toStrike();}
 else if(S==='strike'){strikeT+=d*1000;if(justDown){hookUp(clamp(1-strikeT/strikeLen,0,1));}else if(strikeT>strikeLen)gotAway();}
 else if(S==='fight'){
  fishPull=lerp(fishPull,fishPullTarget,d*2);
  if(Math.random()<d*1.2)fishPullTarget=rnd(0.15,0.85)*caughtFish.fight;
  fishDir=Math.sin(tt*1.7);
  if(down){distance-=d*0.22;tension+=d*(0.55+fishPull*0.9);}
  else{tension-=d*0.8;distance+=d*0.04*fishPull;}
  tension=clamp(tension,0,1.2);distance=clamp(distance,0,1.1);
  if(tension>=1.0)line-=d*(tension-0.9)*2.2; else line=clamp(line+d*0.15,0,1);
  if(line<=0)lineSnap();
  if(distance<=0.06)landFish();
  if(down&&Math.random()<d*8)addRipple(lure.x+rnd(-8,8),lure.y+rnd(-4,4));}
 else if(S==='caught'){if(justDown&&msgT<=0)startAim();}
 else if(S==='lost'){if(justDown)startAim();}
 if(msgT>0)msgT-=d*1000;
 justDown=false;justUp=false;
}
function drawWater(){
 x.fillStyle=grad(0,0,0,180,[[0,'#bfe9ff'],[1,'#7fc1e6']]);x.fillRect(0,0,W,180);
 const sg=x.createRadialGradient(W-70,60,4,W-70,60,90);sg.addColorStop(0,'rgba(255,247,210,.9)');sg.addColorStop(1,'rgba(255,247,210,0)');x.fillStyle=sg;x.fillRect(W-180,0,180,160);
 x.fillStyle='#6fa57c';for(let i=0;i<5;i++){const cx=-20+i*100-(tt*7%100);x.beginPath();x.moveTo(cx-70,155);x.lineTo(cx,95);x.lineTo(cx+70,155);x.fill();}
 x.fillStyle='#356b3f';x.fillRect(0,140,W,28);
 x.fillStyle=grad(0,160,0,182,[[0,'#caa15a'],[1,'#9c7536']]);x.fillRect(0,162,W,20);
 x.fillStyle=grad(0,182,0,H,[[0,'#3f9bdc'],[0.5,'#2a6cc9'],[1,'#143a7a']]);x.fillRect(0,182,W,H-182);
 for(let i=0;i<10;i++){const yy=210+i*44,off=Math.sin(tt*0.6+i)*30;x.fillStyle='rgba(150,205,255,'+(0.05+0.04*Math.sin(tt+i))+')';x.fillRect(0,yy+off*0.1,W,10);}
 for(let i=0;i<22;i++){const px=(i*53+tt*18)%W,py=220+((i*97)%(H-240))+Math.sin(tt*1.2+i)*6;x.fillStyle='rgba(200,235,255,'+(0.10+0.08*Math.sin(tt*2+i))+')';x.fillRect(px,py,2,2);}
 [[60,300],[280,420],[150,520],[300,250],[40,470]].forEach((p,i)=>{const py=p[1]+Math.sin(tt*0.8+i)*2;x.fillStyle='#2f7d44';x.beginPath();x.ellipse(p[0],py,18,9,0,0,TAU);x.fill();x.fillStyle='#226235';x.beginPath();x.moveTo(p[0],py);x.lineTo(p[0]+5,py-9);x.lineTo(p[0]+9,py);x.fill();});
}
function drawRipples(){ripples.forEach(r=>{x.strokeStyle='rgba(220,245,255,'+r.a*0.7+')';x.lineWidth=1.5;x.beginPath();x.ellipse(r.x,r.y,r.r,r.r*0.45,0,0,TAU);x.stroke();});}
function drawSplash(){splash.forEach(s=>{x.fillStyle='rgba(225,245,255,'+s.a+')';x.beginPath();x.arc(s.x,s.y,s.r,0,TAU);x.fill();});}
function drawBass(cx,cy,s,flip,fin){
 x.save();x.translate(cx,cy);if(flip)x.scale(-1,1);x.scale(s,s);
 const tw=fin?Math.sin(tt*10)*3:0;
 x.fillStyle='#46612b';x.beginPath();x.moveTo(-22,0);x.lineTo(-34,-12+tw);x.lineTo(-30,0);x.lineTo(-34,12-tw);x.closePath();x.fill();
 const bg=x.createLinearGradient(0,-12,0,12);bg.addColorStop(0,'#7fa24e');bg.addColorStop(0.45,'#5d7d36');bg.addColorStop(0.5,'#516f2f');bg.addColorStop(0.55,'#5d7d36');bg.addColorStop(1,'#cdd6a0');
 x.fillStyle=bg;x.beginPath();x.ellipse(0,0,24,12,0,0,TAU);x.fill();
 x.fillStyle='#46612b';x.beginPath();x.moveTo(-8,-11);x.lineTo(-2,-20);x.lineTo(10,-10);x.closePath();x.fill();
 x.fillStyle='rgba(40,55,25,.7)';for(let i=-3;i<5;i++)x.fillRect(i*6-2,-2,4,3);
 x.strokeStyle='#3c5226';x.lineWidth=1.4;x.beginPath();x.moveTo(13,-8);x.lineTo(11,8);x.stroke();
 x.fillStyle='#fff';x.beginPath();x.arc(18,-3,3,0,TAU);x.fill();x.fillStyle='#111';x.beginPath();x.arc(19,-3,1.6,0,TAU);x.fill();
 x.strokeStyle='#2c3a1c';x.lineWidth=1.6;x.beginPath();x.moveTo(22,2);x.lineTo(26,4);x.stroke();
 x.restore();
}
function drawAngler(){
 const ax=W/2,ay=H-70;
 x.fillStyle=grad(ax-70,ay+30,ax+70,ay+60,[[0,'#b5651d'],[1,'#7a4214']]);rr(ax-72,ay+26,144,40,16);x.fill();
 x.fillStyle='#8a4f18';rr(ax-66,ay+22,132,12,8);x.fill();
 x.fillStyle='#1f3b6e';rr(ax-16,ay-26,32,42,8);x.fill();
 x.fillStyle='#e7c9a0';x.beginPath();x.arc(ax,ay-34,11,0,TAU);x.fill();
 x.fillStyle='#cf3b3b';rr(ax-12,ay-44,24,8,4);x.fill();x.fillStyle='#102447';rr(ax-12,ay-46,24,4,2);x.fill();
 x.strokeStyle='#e7c9a0';x.lineWidth=5;x.lineCap='round';x.beginPath();x.moveTo(ax-8,ay-14);x.lineTo(ax-26,ay-2);x.stroke();
}
function drawRodLine(){
 const ax=W/2,rtX=W/2-30,rtY=H-150;
 x.strokeStyle=grad(ax-26,H-72,rtX,rtY,[[0,'#3a2a18'],[1,'#caa15a']]);x.lineWidth=4;x.lineCap='round';
 x.beginPath();x.moveTo(ax-26,H-72);x.lineTo(rtX,rtY);x.stroke();
 const sag=(S==='fight')?lerp(40,2,clamp(tension,0,1)):22;
 const mx=(rtX+lure.x)/2+((S==='fight')?Math.sin(tt*8)*tension*4:0),my=(rtY+lure.y)/2+sag;
 x.strokeStyle=(S==='fight'&&tension>0.85)?'rgba(255,120,120,.95)':'rgba(245,250,255,.85)';
 x.lineWidth=(S==='fight')?1.5+tension:1.4;
 x.beginPath();x.moveTo(rtX,rtY);x.quadraticCurveTo(mx,my,lure.x,lure.y);x.stroke();
}
function drawLure(){x.fillStyle='#ffd23f';x.strokeStyle='#a8141b';x.lineWidth=1;x.beginPath();x.arc(lure.x,lure.y,4,0,TAU);x.fill();x.stroke();}
function meter(px,py,w,h,frac,col){rr(px,py,w,h,h/2);x.fillStyle='rgba(0,0,0,.45)';x.fill();rr(px+2,py+2,(w-4)*clamp(frac,0,1),h-4,(h-4)/2);x.fillStyle=col;x.fill();}
function hud(){
 x.fillStyle='rgba(6,12,22,.7)';x.fillRect(0,0,W,40);
 txt('SCORE',12,18,'#8fb6dd',11,'left',700);txt(String(score).padStart(6,'0'),12,34,'#ffd23f',18,'left',800);
 txt('BEST',W-12,18,'#8fb6dd',11,'right',700);txt(String(best).padStart(6,'0'),W-12,34,'#fff',16,'right',800);
 txt('魚 '+caught,W/2,30,'#cfe3f5',16,'center',800);
}
function banner(jp,en,y){txt(jp,W/2,y,'#fff',26,'center',800);if(en)txt(en,W/2,y+22,'#bfe0ff',13,'center',700);}
function render(){
 let sx=0,sy=0;if(shake>0){sx=rnd(-1,1)*shake*0.4;sy=rnd(-1,1)*shake*0.4;}
 x.save();x.translate(sx,sy);
 drawWater();drawRipples();
 if(S==='title'){
  drawAngler();x.fillStyle='rgba(8,20,40,.55)';x.fillRect(0,0,W,H);
  const cy=180;x.fillStyle=grad(40,cy-50,W-40,cy+60,[[0,'#1c3f7a'],[1,'#0e2350']]);rr(30,cy-58,W-60,128,14);x.fill();
  x.lineWidth=3;x.strokeStyle='#ffd23f';rr(30,cy-58,W-60,128,14);x.stroke();
  txt('バス釣り名人',W/2,cy-2,'#ffd23f',40,'center',800);txt('SUPER BASS MASTER',W/2,cy+28,'#eaf4ff',15,'center',700);
  txt('32-BIT EDITION',W/2,cy+52,'#9ec3e8',11,'center',700);
  if(Math.floor(tt*1.6)%2===0)txt('▶ TAP / SPACE TO START',W/2,H-150,'#fff',16,'center',800);
  txt('© 198X NEW BRAUNFELS SOFT',W/2,H-40,'rgba(255,255,255,.55)',11,'center',700);
  drawBass((tt*40)%(W+80)-40,430,1.4,((tt*40)%((W+80)*2))>(W+80),true);
 } else if(S==='aim'){
  drawAngler();drawRodLine();drawLure();banner('狙え!','HOLD to charge • RELEASE to cast',92);
  const mw=W-80;meter(40,H-120,mw,18,1,'rgba(0,0,0,.45)');
  x.save();rr(42,H-118,(mw-4)*charge,14,7);x.clip();x.fillStyle=grad(40,0,40+mw,0,[[0,'#39d98a'],[0.6,'#ffd23f'],[1,'#ff5a5a']]);x.fillRect(40,H-120,mw,18);x.restore();
  txt('CAST POWER',W/2,H-128,'#dceaf7',11,'center',700);txt(charge<0.4?'shallow':charge<0.75?'mid':'deep',W/2,H-96,'#bfe0ff',12,'center',700);
 } else if(S==='cast'){drawAngler();drawRodLine();drawLure();banner('','',92);}
 else if(S==='wait'){
  drawAngler();drawRodLine();
  if(shadow){x.fillStyle='rgba(20,40,30,'+(0.15+shadow.app*0.4)+')';x.beginPath();x.ellipse(shadow.x,shadow.y,18*(0.6+shadow.app),8*(0.6+shadow.app),0,0,TAU);x.fill();if(shadow.app>0.6)drawBass(shadow.x,shadow.y,1.1*shadow.app+0.3,shadow.from<0,true);}
  drawLure();banner('待て...','WAIT FOR THE STRIKE',92);
 } else if(S==='strike'){
  drawAngler();drawRodLine();
  x.fillStyle='rgba(235,248,255,.8)';x.beginPath();x.arc(lure.x,lure.y,10+Math.sin(tt*30)*3,0,TAU);x.fill();
  drawBass(lure.x-6,lure.y+6,1.5,false,true);drawLure();
  const fl=Math.floor(tt*12)%2===0;txt('合わせろ!',W/2,92,fl?'#ff5a5a':'#ffd23f',34,'center',800);txt('STRIKE — TAP NOW!',W/2,118,'#fff',16,'center',800);
  meter(60,140,W-120,12,1-strikeT/strikeLen,'#ff5a5a');
 } else if(S==='fight'){
  drawAngler();drawRodLine();
  const fy=lerp(lure.y,250,1-distance),fx=lure.x+Math.sin(tt*1.7)*40*distance;
  drawBass(fx,fy,1.3+(1-distance)*0.6,fishDir<0,true);drawLure();
  banner(down?'巻け!':'ためる','HOLD reel • RELEASE rest',86);
  txt('TENSION',70,H-150,'#dceaf7',11,'left',700);meter(60,H-144,W-120,16,tension,tension>0.85?'#ff3b3b':tension>0.6?'#ffae3b':'#39d98a');
  x.fillStyle='rgba(255,60,60,.5)';x.fillRect(60+(W-120)*0.85,H-146,2,20);
  txt('DISTANCE',70,H-118,'#dceaf7',11,'left',700);meter(60,H-112,W-120,12,distance,'#7fc1e6');
  txt('LINE',70,H-90,'#dceaf7',11,'left',700);meter(60,H-84,W-120,10,line,line>0.4?'#cfe3f5':'#ff5a5a');
  if(tension>0.9&&Math.floor(tt*10)%2===0)txt('EASE OFF!',W/2,H-160,'#ff5a5a',14,'center',800);
 } else if(S==='caught'){
  drawWater();drawRipples();x.fillStyle='rgba(8,20,40,.6)';x.fillRect(0,0,W,H);
  const cy=240;x.fillStyle=grad(30,cy-70,W-30,cy+120,[[0,'#1c3f7a'],[1,'#0e2350']]);rr(30,cy-80,W-60,260,16);x.fill();
  x.lineWidth=3;x.strokeStyle='#ffd23f';rr(30,cy-80,W-60,260,16);x.stroke();
  txt('やったぜ!',W/2,cy-38,'#ffd23f',36,'center',800);txt('FISH ON!',W/2,cy-12,'#eaf4ff',16,'center',700);
  drawBass(W/2,cy+44,2.6+Math.sin(tt*2)*0.05,false,true);
  txt(caughtFish.n+'  ('+caughtFish.en+')',W/2,cy+96,'#fff',16,'center',800);
  txt((caughtFish.kg2||0).toFixed(1)+' kg',W/2,cy+118,'#bfe0ff',14,'center',700);
  txt('+'+gained+' pts',W/2,cy+150,'#ffd23f',20,'center',800);
  if(Math.floor(tt*1.6)%2===0)txt('▶ TAP TO CAST AGAIN',W/2,H-120,'#fff',15,'center',800);
 } else if(S==='lost'){
  drawAngler();drawRodLine();drawLure();txt(msg||'バラした!',W/2,H/2,'#ff6b6b',22,'center',800);
  if(Math.floor(tt*1.6)%2===0)txt('▶ TAP TO TRY AGAIN',W/2,H/2+34,'#fff',15,'center',800);
 }
 drawSplash();hud();
 if(S==='fight'&&tension>0.7){const vg=x.createRadialGradient(W/2,H/2,120,W/2,H/2,W);vg.addColorStop(0,'rgba(255,0,0,0)');vg.addColorStop(1,'rgba(255,0,0,'+(tension-0.7)*0.6+')');x.fillStyle=vg;x.fillRect(0,0,W,H);}
 x.restore();
 if(msgT>0)txt(msg,W/2,150,'#ffe08a',15,'center',800);
}
function frame(){const t=now();dt=Math.min(0.05,(t-last)/1000);last=t;update(dt);render();requestAnimationFrame(frame);}
frame();
</script>
</body>
</html>
